<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reasoning Pro - 10,000+ Questions</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        /* AAPKA PASANDIDA MODERN STYLE - NO CHANGES */
        :root {
            --glass: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
            --accent: #00f2fe;
            --primary-grad: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            --text: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #0f172a;
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.2) 0, transparent 50%), 
                radial-gradient(at 100% 100%, rgba(168, 85, 247, 0.2) 0, transparent 50%);
            color: var(--text);
            min-height: 100vh;
            display: flex; justify-content: center; align-items: center; padding: 20px;
        }

        .container {
            background: var(--glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            width: 100%; max-width: 650px;
            padding: 40px; border-radius: 35px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
        }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .badge { background: rgba(255,255,255,0.1); padding: 8px 18px; border-radius: 50px; font-size: 0.85rem; font-weight: 600; border: 1px solid var(--glass-border); }
        .timer { color: var(--accent); font-weight: 800; font-size: 1.3rem; text-shadow: 0 0 15px rgba(0, 242, 254, 0.4); }

        .question-text { font-size: 1.6rem; font-weight: 700; line-height: 1.4; margin-bottom: 35px; }

        .options-list { display: grid; gap: 15px; margin-bottom: 35px; }
        .option {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--glass-border);
            padding: 22px; border-radius: 22px;
            cursor: pointer; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 1.15rem; display: flex; align-items: center;
        }

        .option:hover { background: rgba(255, 255, 255, 0.1); transform: scale(1.02); border-color: var(--accent); }
        .option.selected { background: var(--primary-grad); border-color: transparent; box-shadow: 0 10px 25px rgba(99, 102, 241, 0.4); }

        .btn-action {
            width: 100%; background: var(--text); color: #0f172a;
            border: none; padding: 20px; border-radius: 22px;
            font-size: 1.2rem; font-weight: 800; cursor: pointer; transition: 0.3s;
        }

        .btn-action:hover:not(:disabled) { background: var(--accent); transform: translateY(-3px); box-shadow: 0 15px 30px rgba(0, 242, 254, 0.4); }
        .btn-action:disabled { opacity: 0.1; cursor: not-allowed; }

        #result-box { text-align: center; display: none; }
        .score-circle {
            width: 160px; height: 160px; border: 6px solid var(--accent);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            margin: 30px auto; font-size: 3.5rem; font-weight: 800;
            background: rgba(255,255,255,0.05); box-shadow: 0 0 30px rgba(0, 242, 254, 0.2);
        }
    </style>
</head>
<body>

<div class="container">
    <div id="quiz-box">
        <div class="header">
            <span class="badge" id="progress">Q. 1 / 20</span>
            <div class="timer" id="time">10:00</div>
        </div>
        <div class="question-text" id="q-text">Loading...</div>
        <div id="options-grid" class="options-list"></div>
        <button class="btn-action" id="next-btn" onclick="handleNext()" disabled>AGLA SAWAL</button>
    </div>

    <div id="result-box">
        <h2 style="font-size: 2.2rem;">Test Complete</h2>
        <div class="score-circle" id="final-score">0</div>
        <button class="btn-action" onclick="location.reload()">TRY NEW SET</button>
    </div>
</div>

<script>
    // --- YAHAN APNE 10,000 QUESTIONS DALEN ---
    const masterDB = [

 { q: "Rythanna Meecosam' initiative kis state se juda hai?", a: ["Telangana", "Andhra Pradesh", "Karnataka", "Kerala"], c: 1 },
 { q: "Aapki Yojana, Aapki Sarkar, Aapke Dwar' kisne shuru kiya?", a: ["Jharkhand", "Bihar", "Odisha", "West Bengal"], c: 0 },

 { q: "Apki Poonji Apka Adhikar' campaign kiske dwara launch kiya gaya?", a: ["Amit Shah", "Narendra Modi", "Nirmala Sitharaman", "Rajnath Singh"], c: 2 },

 { q: "Arunodai 3.0' Yojana kisne shuru ki?", a: ["Assam", "West Bengal", "Tripura", "Meghalaya"], c: 0 },
 { q: "Mukhyamantri Mahila Rojgar Yojana kis state ki hai?", a: ["Uttar Pradesh", "Bihar", "Jharkhand", "Madhya Pradesh"], c: 1 },
 { q: "Lado Laxmi' Yojana kis state government ki hai?", a: ["Rajasthan", "Haryana", "Punjab", "Gujarat"], c: 1 },
 { q: "Matru Van' Initiative kis state se juda hai?", a: ["Haryana", "Punjab", "UP", "MP"], c: 0 },
 { q: "Nijut Moina Yojana 2.0 kis state ki scheme hai?", a: ["Manipur", "Assam", "Arunachal Pradesh", "Mizoram"], c: 1 },
 { q: "Thayumanavar Yojana kis state ne launch ki hai?", a: ["Kerala", "Tamil Nadu", "Andhra Pradesh", "Telangana"], c: 1 },
 { q: "Apna Ghar' Initiative kis Ministry ke antargat aata hai?", a: ["Home Ministry", "Finance Ministry", "Petroleum Ministry", "Defence Ministry"], c: 2 },
 { q: "Shram Shree Yojana kis state ki hai?", a: ["West Bengal", "Bihar", "Odisha", "Jharkhand"], c: 0 },
 { q: "One Road-One Day' Scheme kisne shuru ki?", a: ["Mumbai", "Delhi Govt.", "Bangalore", "Kolkata"], c: 1 },
 { q: "Chief Minister Pratigya Scheme kis state ki hai?", a: ["Bihar", "UP", "MP", "Rajasthan"], c: 0 },
 { q: "Chief Minister Vrindavan Gram Yojana kaha ki hai?", a: ["Rajasthan", "UP", "MP", "Haryana"], c: 2 },
 { q: "D. Upadhyaya Garibi Mukt Gaon Yojana kisne shuru ki?", a: ["Gujarat", "Rajasthan", "MP", "Bihar"], c: 1 },
 { q: "Jan Suraksha Satisfaction Campaign kisne chalaya?", a: ["Maharashtra", "Gujarat", "MP", "Rajasthan"], c: 1 },
 { q: "Raj Bhavan Annadhan Scheme kis state ki hai?", a: ["Goa", "Kerala", "Tamil Nadu", "Karnataka"], c: 0 },
 { q: "CM Guru-Shishya Parampara Scheme kaha ki hai?", a: ["Bihar", "Jharkhand", "UP", "Odisha"], c: 0 },
 { q: "Vivah Mandap Scheme kis state government ki hai?", a: ["UP", "Bihar", "MP", "Rajasthan"], c: 1 },
 { q: "Thalliki Vandanam Scheme kis state se sambandhit hai?", a: ["Telangana", "Andhra Pradesh", "Tamil Nadu", "Kerala"], c: 1 },
 { q: "KUSUM-C scheme kis state mein lagu hai?", a: ["Karnataka", "Maharashtra", "Gujarat", "Rajasthan"], c: 0 },
 { q: "Afforestation project 'Vithoot' kis state ka hai?", a: ["Kerala", "Tamil Nadu", "Karnataka", "Andhra Pradesh"], c: 0 },
 { q: "ANKUR' initiative kis state ka hai?", a: ["West Bengal", "Odisha", "Bihar", "MP"], c: 1 },
 { q: "Jyoti Yojana kis state ki scheme hai?", a: ["Kerala", "Karnataka", "Telangana", "AP"], c: 0 },
 { q: "Ek Desh Ek Dhadkan Campaign kis Ministry ka hai?", a: ["Ministry of Home", "Ministry of Culture", "Ministry of Education", "Ministry of AYUSH"], c: 1 },
 { q: "Indira Soura Giri Jala Vikasama Yojana kaha ki hai?", a: ["Andhra Pradesh", "Telangana", "Karnataka", "Kerala"], c: 1 },
 { q: "Ek Parivar Ek Udyami Campaign kis state ka hai?", a: ["Andhra Pradesh", "Telangana", "Tamil Nadu", "Karnataka"], c: 0 },
 { q: "Viksit Krishi Sankalp Abhiyan kis state ka hai?", a: ["Tripura", "Assam", "Sikkim", "Manipur"], c: 0 },
 { q: "Sagar Mein Samman kis Ministry se juda hai?", a: ["Home Ministry", "Ministry of Transport-Waterways", "Finance Ministry", "Defence Ministry"], c: 1 },
 { q: "Mahila Samvad Abhiyan kis state government ka hai?", a: ["Bihar", "Jharkhand", "UP", "MP"], c: 0 },
 { q: "National Karmayogi Jan Seva Program kis Ministry ka hai?", a: ["Ministry of Health", "Ministry of AYUSH", "Ministry of Railways", "Ministry of Culture"], c: 1 },
 { q: "Pink E-Rickshaw Scheme kis state ki hai?", a: ["Maharashtra", "Delhi", "Gujarat", "Karnataka"], c: 0 },
 { q: "Zero Poverty - P4' Initiative kis state ka hai?", a: ["Andhra Pradesh", "Kerala", "Tamil Nadu", "Karnataka"], c: 0 },
 { q: "CM Girl Child Prosperity Scheme kis state ki hai?", a: ["Tripura", "Manipur", "Meghalaya", "Nagaland"], c: 0 },
 { q: "PARTH Yojana kis state ki hai?", a: ["Rajasthan", "Madhya Pradesh", "Gujarat", "Haryana"], c: 1 },
 { q: "Arunodai' scheme ka version 3.0 kisne launch kiya?", a: ["Himanta Biswa Sarma", "Nitish Kumar", "Mamata Banerjee", "Hemant Soren"], c: 0 },
 { q: "Petroleum Ministry ne kaunsa initiative shuru kiya?", a: ["Apna Ghar", "Shram Shree", "Jyoti Yojana", "Matru Van"], c: 0 },
 { q: "Bihar Govt ne inme se kaunsi yojana shuru ki?", a: ["Lado Laxmi", "Mahila Samvad Abhiyan", "PARTH", "KUSUM-C"], c: 1 },
 { q: "Andhra Pradesh ki 'P4' initiative ka main focus kya hai?", a: ["Zero Poverty", "Education", "Health", "Industry"], c: 0 },
 { q: "Rajasthan ki kaunsi yojana garibi mukti ke liye hai?", a: ["D. Upadhyaya Garibi Mukt Gaon", "Shradhanjali", "Vithoot", "Ankur"], c: 0 },
 { q: "Goa mein 'Annadhan' kahan se shuru kiya gaya?", a: ["Raj Bhavan", "Chief Minister Office", "Vidhan Sabha", "Mandir"], c: 0 },
 { q: "Madhya Pradesh ki Gram yojana ka naam kya hai?", a: ["Vrindavan Gram Yojana", "Shram Gram", "Viksit Gram", "Adarsh Gram"], c: 0 },
 { q: "Ministry of Culture ka campaign kaunsa hai?", a: ["Ek Desh Ek Dhadkan", "Pink E-Rickshaw", "Jyoti Yojana", "Apna Ghar"], c: 0 },
 { q: "Vithoot' project kis cheez se juda hai?", a: ["Afforestation", "Digital Literacy", "Health Care", "Skill Dev"], c: 0 },
 { q: "Jharkhand Govt. ki popular yojana 'Aapke Dwar' ka poora naam?", a: ["Aapki Yojana, Aapki Sarkar, Aapke Dwar", "Hamar Sarkar", "Jan Seva", "CM Help"], c: 0 },
 { q: "Punjab Govt ki yojana inme se kaunsi hai?", a: ["Mukh Mantri Teerth Yatra", "Nijut Moina", "KUSUM-C", "Vivah Mandap"], c: 0 },
 { q: "Maharashtra mein E-Rickshaw ka colour kya rakha gaya hai?", a: ["Blue", "Green", "Pink", "Red"], c: 2 },
    
        // ... Niche aap jitne chahe sawal isi format mein jodein
    ];

    let testSet = [];
    let currentIdx = 0;
    let score = 0;
    let timer = 600;
    let selected = null;
    let timerInterval;

    function init() {
        // Shuffle all and pick 20 random
        testSet = [...masterDB].sort(() => 0.5 - Math.random()).slice(0, 20);
        renderQuestion();
        startTimer();
    }

    function renderQuestion() {
        const data = testSet[currentIdx];
        document.getElementById("progress").innerText = `Q. ${currentIdx + 1} / 20`;
        document.getElementById("q-text").innerText = data.q;
        const grid = document.getElementById("options-grid");
        grid.innerHTML = "";
        data.a.forEach((opt, i) => {
            const div = document.createElement("div");
            div.className = "option";
            div.innerText = opt;
            div.onclick = () => {
                selected = i;
                document.querySelectorAll('.option').forEach(el => el.classList.remove('selected'));
                div.classList.add('selected');
                document.getElementById("next-btn").disabled = false;
            };
            grid.appendChild(div);
        });
        document.getElementById("next-btn").disabled = true;
    }

    function handleNext() {
        if (selected === testSet[currentIdx].c) score++;
        currentIdx++;
        selected = null;
        if (currentIdx < 20) renderQuestion(); else showFinal();
    }

    function showFinal() {
        clearInterval(timerInterval);
        document.getElementById("quiz-box").style.display = "none";
        document.getElementById("result-box").style.display = "block";
        document.getElementById("final-score").innerText = `${score}/20`;
    }

    function startTimer() {
        const timerEl = document.getElementById("time");
        timerInterval = setInterval(() => {
            timer--;
            let m = Math.floor(timer / 60);
            let s = timer % 60;
            timerEl.innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
            if (timer <= 0) showFinal();
        }, 1000);
    }

    init();
</script>
</body>
</html>
