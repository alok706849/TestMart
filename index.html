<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reasoning Master Pro</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --accent: #00f2fe;
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #0f172a; /* Deep Dark Background */
            background-image: 
                radial-gradient(at 0% 0%, rgba(118, 75, 162, 0.3) 0, transparent 50%), 
                radial-gradient(at 100% 100%, rgba(102, 126, 234, 0.3) 0, transparent 50%);
            color: var(--white);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* --- Glassmorphism Card --- */
        .quiz-container {
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            width: 100%;
            max-width: 600px;
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 30px;
        }

        .progress-tag {
            background: rgba(255,255,255,0.15);
            padding: 6px 15px;
            border-radius: 50px;
            font-size: 0.85rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .timer-box {
            color: var(--accent);
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .question-text {
            font-size: 1.6rem;
            font-weight: 800;
            line-height: 1.3;
            margin-bottom: 30px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }

        /* --- Stylish Options --- */
        .options-grid {
            display: grid;
            gap: 15px;
            margin-bottom: 30px;
        }

        .option-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            padding: 18px 25px;
            border-radius: 18px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 1.1rem;
            font-weight: 500;
            position: relative;
            overflow: hidden;
        }

        .option-card:hover {
            background: rgba(255, 255, 255, 0.12);
            transform: translateX(8px);
            border-color: var(--accent);
        }

        .option-card.selected {
            background: var(--primary-gradient);
            border-color: transparent;
            box-shadow: 0 10px 20px rgba(118, 75, 162, 0.4);
            transform: scale(1.02);
        }

        /* --- Action Button --- */
        .btn-next {
            width: 100%;
            background: var(--white);
            color: #1e293b;
            border: none;
            padding: 18px;
            border-radius: 18px;
            font-size: 1.1rem;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-next:hover:not(:disabled) {
            background: var(--accent);
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.6);
        }

        .btn-next:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        /* --- Result Screen --- */
        .result-screen { text-align: center; display: none; }
        .score-circle {
            width: 150px;
            height: 150px;
            border: 8px solid var(--accent);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 30px auto;
            font-size: 3rem;
            font-weight: 800;
            background: rgba(255,255,255,0.05);
        }

    </style>
</head>
<body>

    <div class="quiz-container">
        <div id="quiz-box">
            <div class="header">
                <span id="progress-text" class="progress-tag">Q. 1 / 20</span>
                <div class="timer-box">
                    <span id="time">10:00</span>
                </div>
            </div>

            <div id="question-text" class="question-text">Taiyar ho jaiye... Loading Reasoning Challenge!</div>

            <div id="options-grid" class="options-grid"></div>

            <button id="next-btn" class="btn-next" onclick="nextQuestion()" disabled>AGLA SAWAL</button>
        </div>

        <div id="result-box" class="result-screen">
            <h2 style="font-size: 2.2rem;">Khel Samapt!</h2>
            <div class="score-circle"><span id="final-score">0</span></div>
            <p style="margin-bottom: 30px; opacity: 0.8;">Aapne behtareen performance di hai.</p>
            <button onclick="location.reload()" class="btn-next">PHIR SE KHELEIN</button>
        </div>
    </div>

    <script>
        // Yaha aap apne 10,000 sawal paste kar sakte hain
        const masterDatabase = [
            { q: "Agar 'RED' ko '6720' likha jata hai, to 'GREEN' ko kya likhenge?", a: ["167171120", "1677199", "920077", "445566"], correct: 0 },
            { q: "Relationship: Ek tasveer ki taraf ishara karte hue Ram ne kaha, 'Wo mere baap ke bete ki beti hai'. Ram usse kaise related hai?", a: ["Pita", "Chacha", "Bhai", "Dada"], correct: 0 },
            { q: "Series: 1, 9, 25, 49, ?", a: ["64", "81", "100", "121"], correct: 1 },
            { q: "Odd one out: January, May, July, November?", a: ["January", "May", "July", "November"], correct: 3 },
            // ... Baaki 9,996 sawal yaha aayenge
        ];

        let currentQuestions = [];
        let currentIndex = 0;
        let score = 0;
        let timeLeft = 600;
        let timerInterval;
        let selectedAnswer = null;

        function startQuiz() {
            currentQuestions = masterDatabase.sort(() => 0.5 - Math.random()).slice(0, 20);
            showQuestion();
            startTimer();
        }

        function showQuestion() {
            const qData = currentQuestions[currentIndex];
            document.getElementById("progress-text").innerText = `Q. ${currentIndex + 1} / 20`;
            document.getElementById("question-text").innerText = qData.q;
            
            const grid = document.getElementById("options-grid");
            grid.innerHTML = "";
            
            qData.a.forEach((opt, index) => {
                const card = document.createElement("div");
                card.className = "option-card";
                card.innerText = opt;
                card.onclick = () => selectOption(index, card);
                grid.appendChild(card);
            });
            document.getElementById("next-btn").disabled = true;
            selectedAnswer = null;
        }

        function selectOption(index, card) {
            selectedAnswer = index;
            document.querySelectorAll('.option-card').forEach(c => c.classList.remove('selected'));
            card.classList.add('selected');
            document.getElementById("next-btn").disabled = false;
        }

        function nextQuestion() {
            if (selectedAnswer === currentQuestions[currentIndex].correct) score++;
            currentIndex++;
            if (currentIndex < 20) showQuestion(); else showResult();
        }

        function showResult() {
            clearInterval(timerInterval);
            document.getElementById("quiz-box").style.display = "none";
            document.getElementById("result-box").style.display = "block";
            document.getElementById("final-score").innerText = score;
        }

        function startTimer() {
            const timerEl = document.getElementById("time");
            timerInterval = setInterval(() => {
                timeLeft--;
                let mins = Math.floor(timeLeft / 60);
                let secs = timeLeft % 60;
                timerEl.innerText = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
                if (timeLeft <= 0) showResult();
            }, 1000);
        }

        startQuiz();
    </script>
</body>
</html>
