<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reasoning Pro Test</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* --- Modern CSS Variables & Reset --- */
        :root {
            --primary: #2563eb;       /* Sleek Blue */
            --primary-light: #eff6ff;
            --background: #f1f5f9;   /* Very Light Gray */
            --text-dark: #1e293b;
            --text-light: #64748b;
            --white: #ffffff;
            --shadow-md: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            --transition: all 0.2s ease-in-out;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--background);
            color: var(--text-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* --- Main Container --- */
        .quiz-container {
            background-color: var(--white);
            width: 100%;
            max-width: 650px;
            padding: 40px;
            border-radius: 24px; /* Ultra Rounded Corners */
            box-shadow: var(--shadow-md);
        }

        /* --- Header: Timer & Progress --- */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .progress-text {
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-light);
            background: var(--background);
            padding: 6px 12px;
            border-radius: 20px;
        }

        .timer-box {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            color: #dc2626; /* Modern Red */
            font-size: 1.1rem;
        }

        /* --- Question Area --- */
        .question-section { margin-bottom: 35px; }

        .question-text {
            font-size: 1.5rem;
            font-weight: 700;
            line-height: 1.4;
            color: var(--text-dark);
        }

        /* --- Options Grid --- */
        .options-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
            margin-bottom: 35px;
        }

        .option-card {
            background: var(--white);
            border: 2px solid #e2e8f0; /* Subtle border */
            padding: 18px 24px;
            border-radius: 16px;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            font-size: 1.1rem;
            font-weight: 500;
            color: var(--text-dark);
        }

        /* Hover Effect */
        .option-card:hover:not(.selected) {
            border-color: #cbd5e1;
            background-color: #f8fafc;
        }

        /* Selected State */
        .option-card.selected {
            background-color: var(--primary-light);
            border-color: var(--primary);
            color: var(--primary);
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        }

        /* Answer Indicators (Optional, shown on submit) */
        .option-card.correct { border-color: #10b981; background-color: #ecfdf5; color: #047857; }
        .option-card.wrong { border-color: #ef4444; background-color: #fef2f2; color: #b91c1c; }

        /* --- Action Buttons --- */
        .action-area {
            display: flex;
            justify-content: flex-end;
        }

        .btn-primary {
            background-color: var(--primary);
            color: var(--white);
            border: none;
            padding: 14px 30px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.2);
        }

        .btn-primary:hover {
            background-color: #1d4ed8;
            transform: translateY(-1px);
        }

        .btn-primary:active { transform: translateY(1px); }

        .btn-primary:disabled {
            background-color: #cbd5e1;
            cursor: not-allowed;
            box-shadow: none;
        }

        /* --- Result Screen --- */
        .result-screen { text-align: center; display: none; }
        
        .result-score {
            font-size: 4rem;
            font-weight: 800;
            color: var(--primary);
            margin: 20px 0;
        }

        /* --- Responsive Design (Mobile) --- */
        @media (max-width: 600px) {
            .quiz-container { padding: 25px; border-radius: 20px; }
            .question-text { font-size: 1.25rem; }
            .option-card { padding: 15px 20px; font-size: 1rem; }
        }
    </style>
</head>
<body>

    <div class="quiz-container">
        <div id="quiz-box">
            <div class="header">
                <span id="progress-text" class="progress-text">Question 1 of 20</span>
                <div class="timer-box">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                    <span id="time">10:00</span>
                </div>
            </div>

            <div class="question-section">
                <h2 id="question-text" class="question-text">Loading premium questions...</h2>
            </div>

            <div id="options-grid" class="options-grid">
                </div>

            <div class="action-area">
                <button id="next-btn" class="btn-primary" onclick="nextQuestion()" disabled>Next Question</button>
            </div>
        </div>

        <div id="result-box" class="result-screen">
            <h2 style="font-size: 2rem; font-weight: 700;">Test Complete!</h2>
            <p style="color: var(--text-light); margin-top: 10px;">You've generated a unique reasoning set.</p>
            <div class="result-score"><span id="final-score">0</span><span style="font-size: 1.5rem; color: var(--text-light);">/20</span></div>
            <button onclick="location.reload()" class="btn-primary">Try Another Set</button>
        </div>
    </div>

    <script>
        // --- 10,000 Questions "Simulator" ---
        // As discussed, this will move to questions.json later.
        const masterDatabase = [
            { q: "If A = 1, B = 2, what is C?", a: ["3", "4", "5", "6"], correct: 0 },
            { q: "Identify the next number: 2, 4, 8, 16, ?", a: ["24", "30", "32", "64"], correct: 2 },
            { q: "Which word does not belong?", a: ["Apple", "Banana", "Carrot", "Grape"], correct: 2 },
            { q: "Find the odd one out.", a: ["Circle", "Square", "Triangle", "Line"], correct: 3 },
            // Add more here for testing...
        ];

        let currentQuestions = [];
        let currentIndex = 0;
        let score = 0;
        let timeLeft = 600; // 10 minutes
        let timerInterval;

        function startQuiz() {
            // 1. Pick 20 Random Questions
            currentQuestions = masterDatabase.sort(() => 0.5 - Math.random()).slice(0, 20);
            
            // 2. Start Timer & Show First Question
            startTimer();
            showQuestion();
        }

        function showQuestion() {
            const qData = currentQuestions[currentIndex];
            
            // Update Progress & Question
            document.getElementById("progress-text").innerText = `Question ${currentIndex + 1} of 20`;
            document.getElementById("question-text").innerText = qData.q;
            
            // Generate Options
            const grid = document.getElementById("options-grid");
            grid.innerHTML = ""; // Clear old options
            
            qData.a.forEach((opt, index) => {
                const card = document.createElement("div");
                card.className = "option-card";
                card.innerText = opt;
                card.onclick = () => selectOption(index, card);
                grid.appendChild(card);
            });

            // Disable 'Next' button until option is selected
            document.getElementById("next-btn").disabled = true;
            selectedAnswer = null;
        }

        let selectedAnswer = null;
        function selectOption(index, card) {
            selectedAnswer = index;
            
            // Deselect all
            document.querySelectorAll('.option-card').forEach(c => c.classList.remove('selected'));
            
            // Select clicked
            card.classList.add('selected');
            
            // Enable 'Next'
            document.getElementById("next-btn").disabled = false;
        }

        function nextQuestion() {
            if (selectedAnswer === null) return; // Should not happen
            
            // Check Answer
            if (selectedAnswer === currentQuestions[currentIndex].correct) {
                score++;
            }
            
            currentIndex++;
            
            if (currentIndex < 20) {
                showQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            clearInterval(timerInterval);
            document.getElementById("quiz-box").style.display = "none";
            document.getElementById("result-box").style.display = "block";
            document.getElementById("final-score").innerText = score;
        }

        function startTimer() {
            const timerEl = document.getElementById("time");
            timerInterval = setInterval(() => {
                timeLeft--;
                let mins = Math.floor(timeLeft / 60);
                let secs = timeLeft % 60;
                timerEl.innerText = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
                
                if (timeLeft <= 0) {
                    showResult();
                }
            }, 1000);
        }

        // Initialize
        startQuiz();
    </script>
</body>
</html>
